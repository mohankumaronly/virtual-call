spring:
  application:
    name: virtual

  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  mail:
    host: ${BREVO_SMTP_HOST}
    port: ${BREVO_SMTP_PORT}
    username: ${BREVO_USERNAME}
    password: ${BREVO_SMTP_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

brevo:
  api:
    key: ${BREVO_API_KEY}
  from:
    email: ${BREVO_FROM_EMAIL}
    name: ${BREVO_FROM_NAME}